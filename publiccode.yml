description:
  it:
    localisedName: "MCP Server per il Design System .italia"
    shortDescription: >
      Server MCP non ufficiale che espone a assistenti AI i dati strutturati
      del Design System .italia: componenti, token CSS, linee guida e issue GitHub.
    longDescription: >
      Server MCP (Model Context Protocol) remoto non ufficiale che consente ad
      assistenti AI (Claude, Cursor, VS Code) di accedere in modo strutturato
      alle risorse del Design System .italia. Aggrega dati da 9 sorgenti
      ufficiali: markup HTML dei componenti Bootstrap Italia, token CSS --bsi-*
      con valori risolti, linee guida d'uso da Designers Italia, stato di
      accessibilità, props dei web component Dev Kit Italia, issue GitHub in
      tempo reale e versioni verificate delle librerie. Il tool principale
      get_component_full restituisce in una singola chiamata tutte le
      informazioni disponibili su un componente, inclusi URL di documentazione
      ufficiale e versioni correnti di Design System, Bootstrap Italia e Dev Kit Italia.
    documentation: "https://github.com/fupete/design-system-italia-mcp#readme"
    features:
      - Espone 12 tool MCP per accesso strutturato al Design System .italia
      - Aggrega 9 sorgenti dati tramite snapshot CI nightly (solo GitHub Issues live)
      - Risoluzione catena token CSS (--bsi-* → --it-* → valore concreto) (alpha BSI v3)
      - Linee guida d'uso e stato accessibilità per componente
      - Issue GitHub live sui repository del design system
      - Cache con due bucket TTL. Snapshot 24h, GitHub Issues 15min
      - Versioni verificate di Design system, Bootstrap Italia e Dev Kit Italia (alpha v1)
      - Deploy universale via Docker (locale o VPS EU)
  en:
    localisedName: "MCP Server for Design System .italia"
    shortDescription: >
      Unofficial MCP server providing AI assistants with structured access to
      Italy's Design System: components, CSS tokens, guidelines and GitHub issues.
    longDescription: >
      An unofficial remote MCP (Model Context Protocol) server that enables
      AI assistants (Claude, Cursor, VS Code) to access Italy's Design System
      resources in a structured way. Aggregates data from 9 official sources:
      Bootstrap Italia component HTML markup, --bsi-* CSS tokens with resolved
      values, usage guidelines from Designers Italia, accessibility status,
      Dev Kit Italia web component props, real-time GitHub issues, and verified
      library versions. The main get_component_full tool returns all available
      information about a component in a single API call, including official
      documentation URLs and current versions of Design System, Bootstrap Italia
      and Dev Kit Italia.
    documentation: "https://github.com/fupete/design-system-italia-mcp#readme"
    features:
      - Exposes 12 MCP tools for structured access to Italy's Design System
      - Aggregates 9 official data sources in real time
      - CSS token chain resolution (--bsi-* → --it-* → concrete value) (alpha BSI v3)
      - Usage guidelines and accessibility status per component
      - Live GitHub issues from design system repositories
      - Verified versions of Design System, Bootstrap Italia and Dev Kit Italia (alpha v1)
      - Configurable TTL cache per data source
      - Universal Docker deploy (local or EU VPS)
