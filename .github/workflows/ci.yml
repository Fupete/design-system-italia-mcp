name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: test -f dist/index.js && echo "✅ dist/index.js present"
      - run: npx tsx --test src/loaders/devkit-parser.test.ts
      - run: npx tsx --test src/cache.test.ts
      - run: npx tsx --test src/health.test.ts