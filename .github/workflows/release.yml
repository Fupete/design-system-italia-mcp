name: Release

# Expected workflow before tagging:
#   1. Update package.json + publiccode.yml to the new version
#   2. git commit -am "chore: release vX.Y.Z" && git push
#   3. git tag vX.Y.Z && git push origin vX.Y.Z   ← triggers this workflow

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight release

permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: verify, typecheck, build, upload artifact ──────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Check package.json and publiccode.yml match tag
        run: npx tsx scripts/check-version.ts "${GITHUB_REF_NAME#v}"

      - run: npx tsc --noEmit
      - run: npm run build
      - run: test -f dist/index.js && echo "✅ dist/index.js present"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 2: publish Docker + npm using the artifact from job 1 ─────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set version outputs
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}"      >> "$GITHUB_OUTPUT"
          echo "SEMVER=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Docker multiarch ─────────────────────────────────────────────────

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/fupete/design-system-italia-mcp:${{ steps.version.outputs.TAG }}
            ghcr.io/fupete/design-system-italia-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── npm publish ──────────────────────────────────────────────────────

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
