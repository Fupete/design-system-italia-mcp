name: Upstream canary

# Checks that all upstream data sources are reachable and structurally valid.
# Sources and validation rules are defined in scripts/canary.config.ts,
# which imports URLs from src/constants.ts — this workflow only runs the script.
#
# On failure, opens a GitHub issue tagged "canary" (deduplicated by date).

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    name: Check upstream sources
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run canary checks
        id: canary
        run: npx tsx scripts/canary.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        continue-on-error: true

      - name: Open issue on failure
        if: steps.canary.outputs.HAS_FAILURES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[canary] Upstream source failure – ${new Date().toISOString().slice(0,10)}`;

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['canary'],
            });
            if (open.data.some(i => i.title === title)) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['canary'],
              body: [
                '## ⚠️ Upstream source failure',
                '',
                'One or more data sources failed the daily canary check.',
                'This likely indicates a structural change in an upstream API or repository.',
                '',
                '### Failed sources',
                `${{ steps.canary.outputs.FAILED_SOURCES }}`,
                '',
                '### Next steps',
                '1. Verify the URL in a browser',
                '2. Check the upstream repo for recent commits or API changes',
                '3. Update `src/constants.ts` or the affected loader',
                '4. Update `scripts/canary.config.ts` if the response structure changed',
                '5. Close this issue once resolved',
                '',
                `_Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`,
              ].join('\n'),
            });
